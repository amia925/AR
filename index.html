<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Space Paint AR - Debug</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-line-component@0.2.0/dist/aframe-line-component.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #webcam { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      object-fit: cover; z-index: -1; transform: scaleX(-1);
    }
    #start-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100; 
      display: flex; flex-direction: column; justify-content: center; 
      align-items: center; color: white; text-align: center;
    }
    #start-btn {
      padding: 15px 40px; background: #00FFCC; color: #111; border: none;
      border-radius: 50px; font-size: 20px; font-weight: bold; margin-top: 20px;
    }
    #debug-status {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: rgba(0,0,0,0.85); color: #0f0; padding: 10px; 
      border-radius: 5px; font-family: monospace; font-size: 13px; max-width: 90%;
    }
    #clear-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 10; padding: 12px 30px; background: #FF3366; color: white;
      border: none; border-radius: 50px; font-size: 17px;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h2>3D Space Paint AR</h2>
    <p>手をカメラに近づけてみてください<br>親指と人差し指をくっつけて描画</p>
    <button id="start-btn" onclick="initAR()">カメラ起動</button>
  </div>

  <div id="debug-status">準備中...</div>
  <video id="webcam" autoplay playsinline muted></video>
  <button id="clear-btn" onclick="clearPaint()" style="display:none;">クリア</button>

  <a-scene vr-mode-ui="enabled: false" embedded>
    <a-entity id="paint-container"></a-entity>
    <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <script>
    const video = document.getElementById('webcam');
    const container = document.getElementById('paint-container');
    const overlay = document.getElementById('start-overlay');
    const clearBtn = document.getElementById('clear-btn');
    const status = document.getElementById('debug-status');

    let lastPosition = null;
    const MAX_LINES = 150;

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,           // 軽量モード
      minDetectionConfidence: 0.3,  // 大幅に下げて検出しやすく
      minTrackingConfidence: 0.3
    });

    hands.onResults((results) => {
      const handCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
      
      status.innerHTML = `
        Hands: ${handCount}<br>
        Detection: ${results.multiHandLandmarks ? '成功' : '失敗'}
      `;

      if (handCount === 0) {
        lastPosition = null;
        return;
      }

      const landmarks = results.multiHandLandmarks[0];
      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];

      // ピンチ距離
      const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);

      if (pinchDist > 0.09) {
        lastPosition = null;
        return;
      }

      // 座標変換
      const x = (indexTip.x - 0.5) * 3.8;
      const y = (0.5 - indexTip.y) * 3.2;
      const z = indexTip.z * -7 - 1.8;

      const currentPos = `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`;

      if (lastPosition) {
        const line = document.createElement('a-entity');
        line.setAttribute('line', `start: ${lastPosition}; end: ${currentPos}; color: #00FFCC; opacity: 0.95; line-width: 10`);
        container.appendChild(line);
      }

      lastPosition = currentPos;

      if (container.children.length > MAX_LINES) {
        container.removeChild(container.firstChild);
      }
    });

    async function initAR() {
      overlay.style.display = 'none';
      clearBtn.style.display = 'block';
      status.textContent = "カメラ起動中...";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        video.srcObject = stream;
        await video.play();

        status.innerHTML = "カメラOK<br>手を近づけてください（手のひらをカメラに向ける）";

        // MediaPipe処理
        setInterval(async () => {
          if (video.readyState >= 2) {
            try {
              await hands.send({ image: video });
            } catch (e) {
              console.error(e);
            }
          }
        }, 50);

      } catch (err) {
        console.error(err);
        status.textContent = "カメラエラー: " + err.message;
      }
    }

    function clearPaint() {
      container.innerHTML = '';
      lastPosition = null;
    }
  </script>
</body>
</html>
