<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR 3D空間ペイント</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* 最もエラーが起きにくい方法で背面カメラを画面いっぱいに広げます */
    #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
    .a-canvas { z-index: 1; }
    /* 画面リセット用のボタン */
    #clear-btn {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10; padding: 12px 24px; background: #FF3366; color: white;
      border: none; border-radius: 25px; font-size: 16px; font-weight: bold;
    }
  </style>
</head>
<body>

  <video id="webcam" autoplay playsinline></video>
  <button id="clear-btn" onclick="clearPaint()">画面をクリア</button>

  <a-scene vr-mode-ui="enabled: false" embedded>
    <a-entity id="paint-container"></a-entity>

    <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <script>
    const videoElement = document.getElementById('webcam');
    const container = document.getElementById('paint-container');
    
    // MediaPipe Hands の初期化
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5, // 少し認識を優しくして反応しやすくしました
      minTrackingConfidence: 0.5
    });

    // 手が認識されたときの処理（指の軌跡に球体を置いていく）
    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8]; // 人差し指の先

        // 指の画面内座標をA-Frameの3D空間の座標（メートル）に変換
        const handX = (indexTip.x - 0.5) * 3; 
        const handY = (0.5 - indexTip.y) * 2;
        const handZ = -1.5; // カメラの手前 1.5メートルの位置に描く

        // 【ペイント処理】新しく小さな光る球体（点）を作って空間に配置する
        const dot = document.createElement('a-sphere');
        dot.setAttribute('position', `${handX} ${handY} ${handZ}`);
        dot.setAttribute('radius', '0.02'); // 直径4cmの小さな点
        dot.setAttribute('color', '#33FFFF'); // ネオンブルー
        dot.setAttribute('material', 'shader: flat; json: true'); // 光っているように見える設定
        
        // 画面に点を追加
        container.appendChild(dot);

        // 点が増えすぎると重くなるので、300個を超えたら古いものから消す
        if (container.children.length > 300) {
          container.removeChild(container.firstChild);
        }
      }
    });

    // 画面をクリアする関数
    function clearPaint() {
      container.innerHTML = '';
    }

    // エラーが起きにくい標準的なカメラ起動処理（外カメラを最優先）
    navigator.mediaDevices.getUserMedia({ 
      video: { 
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      } 
    })
    .then((stream) => {
      videoElement.srcObject = stream;
      videoElement.onloadedmetadata = () => {
        // 1秒間に30回、カメラ映像をMediaPipeに送って処理する
        setInterval(async () => {
          await hands.send({image: videoElement});
        }, 1000 / 30);
      };
    })
    .catch((err) => {
      alert("カメラの起動に失敗しました。ブラウザの設定でカメラを許可してください。");
      console.error(err);
    });
  </script>
</body>
</html>
