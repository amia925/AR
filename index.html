<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Space Paint AR</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-line-component@0.2.0/dist/aframe-line-component.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #webcam { 
      position: absolute; 
      top: 0; left: 0;
      width: 100%; height: 100%; 
      object-fit: cover; 
      z-index: -1; 
      transform: scaleX(-1); /* 鏡像（自然に見えるように） */
    }
    
    #start-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100; 
      display: flex; flex-direction: column; 
      justify-content: center; align-items: center; color: white; text-align: center;
    }
    #start-btn {
      padding: 15px 40px; background: #00FFCC; color: #111; border: none;
      border-radius: 50px; font-size: 20px; font-weight: bold; margin-top: 20px;
    }

    #debug-status {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: rgba(0,0,0,0.8); color: #0f0; padding: 10px; border-radius: 5px;
      font-family: monospace; max-width: 80%;
    }

    #clear-btn {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 10; padding: 12px 30px; background: #FF3366; color: white;
      border: none; border-radius: 50px; font-size: 17px; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h2>3D Space Paint AR</h2>
    <p>カメラ許可をタップしてください<br>人差し指＋親指で描画開始</p>
    <button id="start-btn" onclick="initAR()">カメラを起動する</button>
  </div>

  <div id="debug-status">準備中... スタートボタンを押してください</div>
  <video id="webcam" autoplay playsinline muted></video>
  <button id="clear-btn" onclick="clearPaint()" style="display:none;">クリア</button>

  <a-scene vr-mode-ui="enabled: false" embedded>
    <a-entity id="paint-container"></a-entity>
    <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
    <a-entity light="type: directional; intensity: 0.6; position: 1 2 1"></a-entity>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <script>
    const video = document.getElementById('webcam');
    const container = document.getElementById('paint-container');
    const overlay = document.getElementById('start-overlay');
    const clearBtn = document.getElementById('clear-btn');
    const status = document.getElementById('debug-status');

    let isDrawing = false;
    let lastPosition = null;
    const MAX_LINES = 180;

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      status.textContent = `Hands: ${results.multiHandLandmarks?.length || 0}`;

      if (!results.multiHandLandmarks?.length) {
        lastPosition = null;
        return;
      }

      const landmarks = results.multiHandLandmarks[0];
      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];

      const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
      isDrawing = pinchDist < 0.08;

      if (!isDrawing) {
        lastPosition = null;
        return;
      }

      const x = (indexTip.x - 0.5) * 3.5;
      const y = (0.5 - indexTip.y) * 3.0;
      const z = indexTip.z * -6 - 1.5;

      const currentPos = `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`;

      if (lastPosition) {
        const line = document.createElement('a-entity');
        line.setAttribute('line', `start: ${lastPosition}; end: ${currentPos}; color: #00FFCC; opacity: 0.9; line-width: 8`);
        container.appendChild(line);
      }

      lastPosition = currentPos;

      if (container.children.length > MAX_LINES) {
        container.removeChild(container.firstChild);
      }
    });

    async function initAR() {
      overlay.style.display = 'none';
      clearBtn.style.display = 'block';
      status.textContent = "カメラ起動中... 許可を待っています";

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: { ideal: "environment" },  // exact → ideal に変更
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();   // 明示的にplay

        status.textContent = "カメラ起動成功！ 手を認識中...";

        // MediaPipe処理開始
        setInterval(async () => {
          if (video.readyState >= 2) {
            await hands.send({ image: video });
          }
        }, 40);

      } catch (err) {
        console.error(err);
        status.textContent = "カメラエラー: " + err.message;
        alert("カメラが起動できませんでした。\n\n・HTTPSでアクセスしていますか？\n・カメラ許可を出しましたか？\n・別のブラウザで試してください。");
      }
    }

    function clearPaint() {
      container.innerHTML = '';
      lastPosition = null;
      status.textContent = "クリアしました";
    }
  </script>
</body>
</html>
