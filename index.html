<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR 物理ボクシング</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
    .a-canvas { z-index: 1; }
  </style>
</head>
<body>

  <video id="webcam" autoplay playsinline></video>

  <a-scene vr-mode-ui="enabled: false" embedded>
    <a-box id="target-box" 
           position="0 0 -2" 
           rotation="0 45 0" 
           width="0.4" height="0.4" depth="0.4" 
           color="#FF3366">
    </a-box>

    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 0.6;" position="1 2 1"></a-entity>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <script>
    const videoElement = document.getElementById('webcam');
    const boxElement = document.getElementById('target-box');

    // 箱の初期状態（位置と、吹っ飛ぶ速度）
    let boxPos = { x: 0, y: 0, z: -2 };
    let boxVelocity = { x: 0, y: 0, z: 0 }; // 飛んでいく速度（ベクトル）

    // 1フレーム前の手の位置を記憶して、パンチの「速度」を計算するための変数
    let lastHandPos = { x: 0, y: 0 };

    // MediaPipe Hands の初期化
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    // 手が認識されたときの処理（メインループ）
    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8]; // 人差し指の先

        // 画面内の指の座標を、A-Frameの空間の座標（メートル）に変換
        const handX = (indexTip.x - 0.5) * 3; 
        const handY = (0.5 - indexTip.y) * 2;

        // 【パンチの速度を計算】 現フレームの座標 - 前フレームの座標
        const speedX = handX - lastHandPos.x;
        const speedY = handY - lastHandPos.y;

        // 【当たり判定】指先と箱の距離を計算（2次元平面＋簡易的な奥行き）
        const dx = handX - boxPos.x;
        const dy = handY - boxPos.y;
        const distance = Math.sqrt(dx*dx + dy*dy);

        // 指先が箱のサイズ内（約25cm以内）に入ったら衝突！
        if (distance < 0.25) {
          // 手が動いた方向に、速度（パワー）を上書きする
          // 勢いよく動かすほど、箱が激しくすっ飛ぶようになります
          boxVelocity.x = speedX * 8; 
          boxVelocity.y = speedY * 8;
          boxVelocity.z = -5; // パンチしたら奥に向かって吹っ飛ぶようにする
        }

        // 今の手の位置を保存（次のフレームの計算用）
        lastHandPos = { x: handX, y: handY };
      }
    });
