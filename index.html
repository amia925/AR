<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Frame + MediaPipe 推しタッチAR</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* 外カメラにするため、鏡面反転（scaleX(-1)）を削除しました */
    #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
    .a-canvas { z-index: 1; }
  </style>
</head>
<body>

  <video id="webcam" autoplay playsinline></video>

  <a-scene vr-mode-ui="enabled: false" embedded>
    <a-assets>
      <a-asset-item id="avatar" src="chara.glb"></a-asset-item>
    </a-assets>

    <a-entity id="my-character" 
              gltf-model="#avatar" 
              position="0 -0.5 -2" 
              scale="0.15 0.15 0.15"
              animation-mixer="clip: idle; loop: repeat">
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
    <a-entity light="type: directional; intensity: 0.6;" position="1 2 1"></a-entity>
    <a-entity camera position="0 0 0"></a-entity>
  </a-scene>

  <script>
    const videoElement = document.getElementById('webcam');
    const character = document.getElementById('my-character');
    let isTouching = false;

    // キャラのスケールに合わせて、判定用の座標も調整
    const charPos = { x: 0, y: -0.5, z: -2 }; 

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8];

        // 外カメラ用にX軸の計算を修正
        const handX = (indexTip.x - 0.5) * 4; 
        const handY = (0.5 - indexTip.y) * 3;
        const handZ = -2; 

        const dx = handX - charPos.x;
        const dy = handY - charPos.y;
        const dz = handZ - charPos.z;
        const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

        // 少し近づけやすくするために判定距離を 0.3（30cm）に調整
        if (distance < 0.3) {
          if (!isTouching) {
            isTouching = true;
            console.log("タッチされました！");
            character.setAttribute('animation-mixer', 'clip: react; loop: once; clampWhenFinished: true');
          }
        } else {
          if (isTouching) {
            isTouching = false;
            character.setAttribute('animation-mixer', 'clip: idle; loop: repeat');
          }
        }
      }
    });

    // 【修正点】facingMode: 'environment' を追加して外カメラを強制起動
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720,
      facingMode: 'environment'
    });
    camera.start();
  </script>
</body>
</html>
