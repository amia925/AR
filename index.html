<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Space Paint AR</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- Line Component -->
  <script src="https://unpkg.com/aframe-line-component@0.2.0/dist/aframe-line-component.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #111; 
      font-family: sans-serif;
    }
    #webcam { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      z-index: -1; 
    }
    .a-canvas { z-index: 1; }
    
    #start-overlay {
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); 
      z-index: 100; 
      display: flex;
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      color: white;
      text-align: center;
    }
    #start-btn {
      padding: 15px 40px; 
      background: #00FFCC; 
      color: #111; 
      border: none;
      border-radius: 50px; 
      font-size: 20px; 
      font-weight: bold;
      margin-top: 20px;
    }

    #debug-status {
      position: absolute; 
      top: 10px; left: 10px; 
      z-index: 10;
      background: rgba(0,0,0,0.7); 
      color: #00FFCC; 
      padding: 8px 12px;
      border-radius: 5px; 
      font-size: 14px; 
      font-family: monospace;
    }

    #clear-btn {
      position: absolute; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%);
      z-index: 10; 
      padding: 12px 30px; 
      background: #FF3366; 
      color: white;
      border: none; 
      border-radius: 50px; 
      font-size: 17px; 
      font-weight: bold;
    }
  </style>
</head>
<body>

  <
